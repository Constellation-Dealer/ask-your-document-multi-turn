<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Your Document — Gateway Chat with Agentic Loop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────── -->
  <header>
    <h1>Ask Your <span>Document</span></h1>
  </header>

  <!-- ── Main Content ────────────────────────────────── -->
  <div class="container">

    <!-- Upload Area -->
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">&#128196;</div>
      <div class="upload-text">
        <strong>Choose a PDF</strong> or drag it here
        <br><span style="font-size:0.8rem">Max 10 MB</span>
      </div>
      <div class="file-name" id="fileName"></div>
    </div>
    <input type="file" id="fileInput" accept=".pdf,application/pdf">

    <!-- Question + Run -->
    <div class="question-row">
      <input type="text" class="question-input" id="questionInput"
        placeholder="What are the safety warnings in this manual?"
        value="What are the safety warnings in this manual?">
      <button class="run-btn" id="runBtn" onclick="handleRun()">Run</button>
    </div>

    <!-- Error Banner -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- Loop Trace -->
    <div class="section-header">LOOP TRACE</div>
    <div class="loop-trace" id="loopTrace"></div>

    <!-- Answer -->
    <div class="answer-section" id="answerSection">
      <div class="section-header">ANSWER</div>
      <div class="answer-box" id="answerBox"></div>
    </div>

  </div>

  <!-- ── Follow-Up Bar (fixed at bottom) ─────────────── -->
  <div class="followup-bar" id="followupBar">
    <div class="followup-inner">
      <div class="followup-label">Follow-up <span id="followupSessionHint" class="followup-hint"></span></div>
      <div class="followup-row">
        <input type="text" class="followup-input" id="followupInput"
          placeholder="Ask a follow-up question..."
          onkeydown="if(event.key==='Enter')handleFollowUp()">
        <button class="followup-btn" id="followupBtn" onclick="handleFollowUp()">Send</button>
      </div>
    </div>
  </div>

  <!--
    ┌─────────────────────────────────────────────────────────┐
    │  FILE GUIDE                                             │
    │                                                         │
    │  .env.example — Copy to .env and fill in credentials    │
    │  styles.css   — UI styling (do not modify)              │
    │  helpers.js   — Auth, API helpers, UI wiring            │
    │                 (do not modify)                          │
    │  loop.js      — YOUR CODE GOES HERE                     │
    │                 Open this file and fill in the TODOs     │
    │  index.html   — This file (page structure)              │
    └─────────────────────────────────────────────────────────┘
  -->

  <script src="helpers.js"></script>
  <script src="loop.js"></script>

</body>
</html>
